<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Garson Çağır</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kart {
      text-align: center;
      padding: 50px 35px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-width: 340px;
      width: 92%;
    }

    .logo { font-size: 64px; margin-bottom: 8px; }

    .etiket {
      font-size: 15px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .masa-no {
      font-size: 72px;
      font-weight: 800;
      color: white;
      line-height: 1;
      margin-bottom: 40px;
    }

    .btn {
      width: 100%;
      padding: 20px;
      font-size: 20px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #e94560, #c23152);
      color: white;
      box-shadow: 0 8px 25px rgba(233,69,96,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 15px rgba(233,69,96,0.3);
    }

    .btn:disabled {
      background: #333;
      box-shadow: none;
      cursor: default;
    }

    .basarili-alan {
      display: none;
      margin-top: 10px;
    }

    .basarili-icon { font-size: 64px; margin-bottom: 12px; }

    .basarili-metin {
      font-size: 18px;
      font-weight: 600;
      color: #4ade80;
      margin-bottom: 8px;
    }

    .alt-metin {
      font-size: 14px;
      color: #666;
    }

    .hata-metin {
      margin-top: 16px;
      font-size: 14px;
      color: #f87171;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="kart">
    <div class="logo">🪑</div>
    <div class="etiket">Masa</div>
    <div class="masa-no" id="masaNo">—</div>

    <button class="btn" id="cagirBtn" onclick="garsonCagir()">
      🔔 &nbsp;Garson Çağır
    </button>

    <div class="basarili-alan" id="basariliAlan">
      <div class="basarili-icon">✅</div>
      <div class="basarili-metin">Garsonunuz geliyor!</div>
      <div class="alt-metin">En kısa sürede masanıza gelecektir.</div>
    </div>

    <div class="hata-metin" id="hataMetin"></div>
  </div>

  <script>
    const parcalar = window.location.pathname.split('/');
    const masaNo = parseInt(parcalar[parcalar.length - 1]);

    if (isNaN(masaNo)) {
      document.getElementById('masaNo').textContent = '?';
    } else {
      document.getElementById('masaNo').textContent = masaNo;
    }

    let cagirildi = false;

    async function garsonCagir() {
      if (cagirildi || isNaN(masaNo)) return;
      cagirildi = true;

      const btn = document.getElementById('cagirBtn');
      btn.disabled = true;
      btn.textContent = 'Gönderiliyor...';
      document.getElementById('hataMetin').textContent = '';

      try {
        const yanit = await fetch('/cagir/' + masaNo, { method: 'POST' });

        if (yanit.ok) {
          btn.style.display = 'none';
          document.getElementById('basariliAlan').style.display = 'block';
        } else {
          throw new Error('Sunucu hatası');
        }
      } catch (e) {
        cagirildi = false;
        btn.disabled = false;
        btn.innerHTML = '🔔 &nbsp;Garson Çağır';
        document.getElementById('hataMetin').textContent = 'Bağlantı hatası, lütfen tekrar deneyin.';
      }
    }
  </script>
</body>
</html>
